<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page not found — Mobin Shaterian</title>
  <script>
    // GitHub Pages SPA fallback: preserve the requested path and redirect to root
    // so TanStack Router can render the proper 404 page client-side.
    sessionStorage.setItem('gh-redirect-path', location.pathname + location.search + location.hash);
    location.replace('/');
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
